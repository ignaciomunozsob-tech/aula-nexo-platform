<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>NOVU — Vende cursos, ebooks y talleres digitales en Chile</title>
    <meta name="description" content="NOVU es la plataforma chilena para crear y vender cursos, ebooks, talleres y comunidades digitales. Gratis para empezar, cobros en CLP con MercadoPago." />
    <meta name="author" content="NOVU" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Warm up MercadoPago TLS to acelerar el redirect al checkout -->
    <link rel="preconnect" href="https://www.mercadopago.cl" crossorigin>
    <link rel="preconnect" href="https://api.mercadopago.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.mercadopago.com">
    <script>
      // Theme init (avoid FOUC)
      (function () {
        try {
          var t = localStorage.getItem('novu-theme');
          var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <meta property="og:title" content="NOVU — Vende cursos, ebooks y talleres digitales" />
    <meta property="og:description" content="Plataforma chilena para creadores: publica, cobra en CLP y crece sin complicarte." />
    <meta property="og:url" content="https://novuproject.lovable.app/" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@NOVUapp" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "NOVU",
        "url": "https://novuproject.lovable.app/",
        "description": "Plataforma chilena para crear y vender productos digitales.",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "NOVU",
        "url": "https://novuproject.lovable.app/"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
